{% extends "base.html" %}
{% block title %}仪表盘 — BitgetFollow{% endblock %}

{% block content %}

<!-- ══ 币安跟单交易员 ════════════════════════════════════════════════════════ -->
<div class="mb-6">
    <!-- 标题 + 添加区 -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-4">
        <div class="flex items-center space-x-3">
            <h2 class="text-xl font-bold text-white tracking-tight">币安跟单交易员</h2>
            <span id="bn-count"
                class="px-2 py-0.5 bg-dark-card border border-dark-border rounded text-yellow-400 text-xs font-mono">0</span>
            <p class="text-xs text-gray-500">监控币安信号 → 自动在 Bitget 复制交易</p>
        </div>
    </div>

    <!-- 添加输入框 -->
    <div class="mb-4 flex gap-2 flex-wrap p-4 bg-dark-card border border-yellow-500/20 rounded-xl">
        <div class="flex-1 min-w-64">
            <label class="text-xs text-gray-400 block mb-1.5">粘贴币安交易员 URL 或 Portfolio ID</label>
            <input id="bn-url-input" type="text"
                placeholder="https://www.binance.com/zh-CN/copy-trading/lead-details/..."
                class="w-full bg-dark-bg border border-dark-border rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400">
        </div>
        <div class="flex items-end">
            <button onclick="addBinanceFromHome()"
                class="px-5 py-2 bg-yellow-500/90 hover:bg-yellow-500 text-black font-bold rounded-lg text-sm transition-colors">
                + 添加交易员
            </button>
        </div>
    </div>

    <!-- 币安交易员卡片网格 -->
    <div id="bn-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    <div id="bn-empty-home" class="text-sm text-gray-500 py-8 text-center">暂未添加币安交易员</div>
</div>

<!-- ══ 🔍 自动筛选优质交易员 ═══════════════════════════════════════════════ -->
<div class="mb-6">
    <div class="bg-dark-card border border-blue-500/30 rounded-2xl overflow-hidden">
        <!-- 头部 -->
        <div class="p-5 border-b border-dark-border/50">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-white flex items-center space-x-2">
                        <span>🔍</span>
                        <span>自动筛选优质交易员</span>
                    </h2>
                    <p class="text-gray-500 text-xs mt-1">自动扫描币安排行榜，筛选出最近赚钱多、回撤少、胜率高的交易员</p>
                </div>
                <div class="flex items-center space-x-2">
                    <button id="btn-scan-start" onclick="startScan()"
                        class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold transition-all shadow-lg shadow-blue-600/20 flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <span>开始扫描</span>
                    </button>
                    <button id="btn-scan-stop" onclick="stopScan()"
                        class="hidden px-4 py-2.5 bg-red-600/20 hover:bg-red-600/30 text-red-400 border border-red-500/30 rounded-xl text-sm font-medium transition-all">
                        停止
                    </button>
                </div>
            </div>
        </div>

        <!-- 筛选参数面板（可折叠） -->
        <div id="scan-filters-panel" class="p-5 border-b border-dark-border/30 bg-dark-bg/30">
            <div class="flex items-center justify-between mb-3 cursor-pointer" onclick="toggleFilters()">
                <span class="text-gray-400 text-sm font-medium">⚙️ 筛选参数（可调）</span>
                <span id="filter-toggle" class="text-gray-500 text-xs">▼ 展开</span>
            </div>
            <div id="filters-body" class="hidden">
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">最低跟单者收益 ($)</label>
                        <input id="f-min-pnl" type="number" value="0" step="1000"
                            class="w-full bg-dark-card border border-dark-border rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-blue-400">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">最低跟单人数</label>
                        <input id="f-min-followers" type="number" value="10" step="10"
                            class="w-full bg-dark-card border border-dark-border rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-blue-400">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">最低夏普比率</label>
                        <input id="f-min-sharp" type="number" value="0" step="0.5"
                            class="w-full bg-dark-card border border-dark-border rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-blue-400">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">最低7天交易次数</label>
                        <input id="f-min-trades" type="number" value="5" step="1"
                            class="w-full bg-dark-card border border-dark-border rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-blue-400">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">最低胜率 (%)</label>
                        <input id="f-min-wr" type="number" value="0" step="5"
                            class="w-full bg-dark-card border border-dark-border rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-blue-400">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">排序方式</label>
                        <select id="f-sort-by"
                            class="w-full bg-dark-card border border-dark-border rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-blue-400">
                            <option value="copier_pnl">跟单者收益</option>
                            <option value="score">综合评分</option>
                            <option value="sharp_ratio">夏普比率</option>
                            <option value="win_rate">胜率</option>
                            <option value="followers">跟单人数</option>
                            <option value="aum">管理资产</option>
                        </select>
                    </div>
                </div>
                <div class="mt-3 flex items-center space-x-4">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">滚动加载次数（越多扫描范围越大）</label>
                        <input id="f-max-scroll" type="number" value="8" min="3" max="20"
                            class="w-24 bg-dark-card border border-dark-border rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-blue-400">
                    </div>
                    <div class="text-xs text-gray-600 pt-4">
                        预计扫描时间：<span id="est-time">2-3 分钟</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 扫描进度 -->
        <div id="scan-progress" class="hidden p-5 border-b border-dark-border/30">
            <div class="flex items-center space-x-3 mb-2">
                <div class="spinner"></div>
                <span id="scan-progress-text" class="text-gray-300 text-sm">正在扫描…</span>
            </div>
            <div class="w-full bg-dark-bg rounded-full h-1.5 overflow-hidden">
                <div id="scan-progress-bar" class="h-full bg-blue-500 rounded-full transition-all duration-500"
                    style="width: 0%"></div>
            </div>
        </div>

        <!-- 扫描结果 -->
        <div id="scan-results" class="hidden">
            <div class="p-4 border-b border-dark-border/30 flex items-center justify-between">
                <span id="scan-results-summary" class="text-gray-300 text-sm"></span>
                <button id="btn-add-all-scan" onclick="addAllScanResults()"
                    class="hidden px-4 py-1.5 bg-green-600 hover:bg-green-700 text-white rounded-lg text-xs font-medium transition-colors">
                    一键添加全部通过
                </button>
            </div>
            <div id="scan-results-list" class="divide-y divide-dark-border/30 max-h-[60vh] overflow-y-auto"></div>
        </div>

        <!-- 扫描错误 -->
        <div id="scan-error" class="hidden p-5">
            <div class="p-4 bg-red-500/10 border border-red-500/30 rounded-xl">
                <p id="scan-error-text" class="text-red-300 text-sm"></p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    // ── 币安交易员管理 ──────────────────────────────────────────────────────────

    let bnListHome = [];

    async function loadBinanceList() {
        try {
            const res = await apiGet('/api/copy/settings');
            if (res && res.binance_traders) {
                let tradersRaw = res.binance_traders;
                if (typeof tradersRaw === 'string') {
                    tradersRaw = JSON.parse(tradersRaw || '{}');
                }

                if (Array.isArray(tradersRaw)) {
                    bnListHome = tradersRaw.map(pid => ({
                        portfolio_id: pid,
                        nickname: `币安交易员_${pid.substring(0, 8)}`,
                        copy_enabled: false
                    }));
                } else if (typeof tradersRaw === 'object') {
                    bnListHome = Object.entries(tradersRaw).map(([pid, data]) => ({
                        portfolio_id: pid,
                        nickname: data.nickname || `币安交易员_${pid.substring(0, 8)}`,
                        follower_count: data.follower_count || 0,
                        copier_pnl: data.copier_pnl || 0,
                        aum: data.aum || 0,
                        total_trades: data.total_trades || 0,
                        copy_enabled: data.copy_enabled === true
                    }));
                } else {
                    bnListHome = [];
                }
                renderBinanceListHome();
            }
        } catch (e) {
            console.error('加载币安交易员失败:', e);
            bnListHome = [];
        }
    }

    function renderBinanceListHome() {
        const grid = document.getElementById('bn-grid');
        const empty = document.getElementById('bn-empty-home');
        const count = document.getElementById('bn-count');

        grid.innerHTML = '';
        if (!bnListHome.length) {
            empty.classList.remove('hidden');
            count.textContent = '0';
            return;
        }
        empty.classList.add('hidden');
        count.textContent = bnListHome.length;

        bnListHome.forEach((trader) => {
            const card = document.createElement('div');
            const pid = trader.portfolio_id;
            const nickname = trader.nickname || `币安交易员_${pid.substring(0, 8)}`;
            const followers = trader.follower_count || 0;
            const copierPnl = trader.copier_pnl || 0;
            const aum = trader.aum || 0;
            const totalTrades = trader.total_trades || 0;
            const copyEnabled = trader.copy_enabled === true;

            const borderClass = copyEnabled
                ? 'border-green-500/40 ring-1 ring-green-500/20'
                : 'border-yellow-500/25 hover:border-yellow-400/60';
            card.className = `bg-dark-card border ${borderClass} rounded-xl overflow-hidden transition-all cursor-pointer group`;

            function formatNum(n) {
                if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
                if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
                return n.toFixed(0);
            }
            const pnlStr = copierPnl > 0 ? `+$${formatNum(copierPnl)}` : copierPnl < 0 ? `-$${formatNum(Math.abs(copierPnl))}` : '$0';
            const pnlColor = copierPnl > 0 ? 'text-profit' : copierPnl < 0 ? 'text-loss' : 'text-gray-400';
            const aumStr = aum > 0 ? `$${formatNum(aum)}` : '—';

            const btnClass = copyEnabled
                ? 'bg-green-500/20 text-green-400 border border-green-500/30 hover:bg-green-500/30'
                : 'bg-gray-700 text-gray-400 border border-gray-600 hover:bg-yellow-600 hover:text-white hover:border-yellow-500';
            const btnText = copyEnabled ? '✓ 跟单中' : '+ 跟单';

            card.innerHTML = `
            <div class="p-4">
                <div class="flex items-start justify-between mb-3">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-white text-sm truncate group-hover:text-yellow-300 transition-colors">
                            ${nickname}
                        </div>
                        <div class="flex items-center space-x-1.5 mt-1">
                            ${copyEnabled
                    ? '<span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span><span class="text-xs text-green-400 font-medium">跟单中</span>'
                    : '<span class="w-2 h-2 bg-yellow-400 rounded-full"></span><span class="text-xs text-yellow-400 font-medium">仅监控</span>'
                }
                        </div>
                    </div>
                    <button onclick="event.stopPropagation(); removeBnFromHome('${pid}')" 
                            class="ml-2 text-gray-600 hover:text-red-400 transition-colors flex-shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="flex items-baseline justify-between mb-3">
                    <div>
                        <div class="text-gray-500 text-xs mb-0.5">跟单收益</div>
                        <div class="font-bold text-xl ${pnlColor}">${pnlStr}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-gray-500 text-xs mb-0.5">管理资产</div>
                        <div class="font-bold text-base text-white">${aumStr}</div>
                    </div>
                </div>
                <div class="flex items-center justify-between text-xs text-gray-500 mb-3">
                    <span>跟单人数: <b class="text-white">${followers > 0 ? followers.toLocaleString() : '—'}</b></span>
                    <span>带单次数: <b class="text-white">${totalTrades > 0 ? totalTrades : '—'}</b></span>
                </div>
                <div class="flex items-center justify-between border-t border-dark-border/50 pt-3">
                    <button onclick="event.stopPropagation(); toggleBinanceCopy('${pid}', ${!copyEnabled}, this)"
                            class="px-4 py-1.5 rounded-lg text-xs font-medium transition-all ${btnClass}">
                        ${btnText}
                    </button>
                    <span class="text-xs text-yellow-600">币安信号</span>
                </div>
            </div>
        `;
            grid.appendChild(card);
        });
    }

    async function toggleBinanceCopy(pid, enabled, btn) {
        btn.disabled = true;
        const origText = btn.textContent;
        btn.textContent = '...';
        try {
            const res = await apiPost('/api/toggle_copy', { uid: pid, enabled });
            if (res.ok) {
                const trader = bnListHome.find(t => t.portfolio_id === pid);
                if (trader) trader.copy_enabled = enabled;
                renderBinanceListHome();
            } else {
                alert(res.error || '切换失败');
                btn.textContent = origText;
            }
        } catch (e) {
            alert('切换失败：' + e.message);
            btn.textContent = origText;
        }
        btn.disabled = false;
    }

    async function addBinanceFromHome() {
        const input = document.getElementById('bn-url-input');
        const url = input.value.trim();
        if (!url) { alert('请输入 URL 或 Portfolio ID'); return; }

        const btn = event.target;
        btn.disabled = true;
        btn.textContent = '添加中…';

        try {
            const res = await apiPost('/api/add_binance_trader', { url });
            if (res.error) {
                alert('❌ 添加失败\n\n' + res.error);
                btn.disabled = false;
                btn.textContent = '+ 添加交易员';
                return;
            }
            await loadBinanceList();
            btn.disabled = false;
            btn.textContent = '+ 添加交易员';
            input.value = '';
            const info = res.info || {};
            const nickname = info.nickname || res.portfolio_id;
            alert(`✓ 已添加 ${nickname}`);
        } catch (e) {
            alert('❌ 添加失败：' + e.message);
            btn.disabled = false;
            btn.textContent = '+ 添加交易员';
        }
    }

    async function removeBnFromHome(pid) {
        const trader = bnListHome.find(t => t.portfolio_id === pid);
        const name = trader?.nickname || pid.substring(0, 12);
        if (!confirm(`确定删除 ${name} ？`)) return;
        try {
            const res = await apiPost('/api/remove_binance_trader', { portfolio_id: pid });
            if (res.error) { alert('删除失败：' + res.error); return; }
            await loadBinanceList();
        } catch (e) {
            alert('删除失败：' + e.message);
        }
    }

    // ── 扫描功能 ──────────────────────────────────────────────────────────────────

    let scanPollingTimer = null;

    function toggleFilters() {
        const body = document.getElementById('filters-body');
        const toggle = document.getElementById('filter-toggle');
        if (body.classList.contains('hidden')) {
            body.classList.remove('hidden');
            toggle.textContent = '▲ 收起';
        } else {
            body.classList.add('hidden');
            toggle.textContent = '▼ 展开';
        }
    }

    function showScanSection(section) {
        ['scan-progress', 'scan-results', 'scan-error'].forEach(id => {
            document.getElementById(id).classList.toggle('hidden', id !== section);
        });
    }

    async function startScan() {
        const btnStart = document.getElementById('btn-scan-start');
        const btnStop = document.getElementById('btn-scan-stop');
        btnStart.disabled = true;
        btnStart.innerHTML = '<div class="spinner mr-2"></div><span>启动中…</span>';
        btnStop.classList.remove('hidden');

        const filters = {
            min_copier_pnl: parseFloat(document.getElementById('f-min-pnl').value) || 0,
            min_followers: parseInt(document.getElementById('f-min-followers').value) || 10,
            min_sharp_ratio: parseFloat(document.getElementById('f-min-sharp').value) || 0,
            min_trades: parseInt(document.getElementById('f-min-trades').value) || 5,
            min_win_rate: parseFloat(document.getElementById('f-min-wr').value) || 0,
            sort_by: document.getElementById('f-sort-by').value,
            max_scroll: parseInt(document.getElementById('f-max-scroll').value) || 8,
        };

        try {
            const res = await apiPost('/api/scan/start', filters);
            if (res.error) {
                alert(res.error);
                resetScanButton();
                return;
            }
            showScanSection('scan-progress');
            startScanPolling();
        } catch (e) {
            alert('启动扫描失败：' + e.message);
            resetScanButton();
        }
    }

    async function stopScan() {
        try {
            await apiPost('/api/scan/stop');
        } catch (e) { }
        stopScanPolling();
        resetScanButton();
    }

    function resetScanButton() {
        const btnStart = document.getElementById('btn-scan-start');
        const btnStop = document.getElementById('btn-scan-stop');
        btnStart.disabled = false;
        btnStart.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><span>开始扫描</span>';
        btnStop.classList.add('hidden');
    }

    function startScanPolling() {
        if (scanPollingTimer) clearInterval(scanPollingTimer);
        scanPollingTimer = setInterval(pollScanStatus, 2000);
    }

    function stopScanPolling() {
        if (scanPollingTimer) {
            clearInterval(scanPollingTimer);
            scanPollingTimer = null;
        }
    }

    async function pollScanStatus() {
        try {
            const status = await apiGet('/api/scan/status');
            document.getElementById('scan-progress-text').textContent = status.progress || '处理中…';

            // 更新进度条
            if (status.phase === 'analyzing' && status.total_found > 0) {
                const pct = Math.min((status.analyzed / status.total_found) * 100, 100);
                document.getElementById('scan-progress-bar').style.width = pct + '%';
            } else if (status.phase === 'scanning') {
                document.getElementById('scan-progress-bar').style.width = '10%';
            }

            if (!status.running) {
                stopScanPolling();
                resetScanButton();

                if (status.phase === 'done') {
                    await loadScanResults();
                } else if (status.phase === 'error') {
                    showScanSection('scan-error');
                    document.getElementById('scan-error-text').textContent = status.error || '扫描失败';
                }
            }
        } catch (e) {
            console.error('轮询扫描状态失败:', e);
        }
    }

    async function loadScanResults() {
        try {
            const data = await apiGet('/api/scan/results');
            const results = data.results || [];
            showScanSection('scan-results');

            const passed = results.filter(r => r.all_passed);
            document.getElementById('scan-results-summary').innerHTML =
                `共分析 <b class="text-white">${results.length}</b> 个交易员，` +
                `<b class="text-green-400">${passed.length}</b> 人全部通过筛选`;

            const btnAddAll = document.getElementById('btn-add-all-scan');
            if (passed.length > 0) {
                btnAddAll.textContent = `一键添加全部 ${passed.length} 人`;
                btnAddAll.classList.remove('hidden');
            } else {
                btnAddAll.classList.add('hidden');
            }

            const list = document.getElementById('scan-results-list');
            list.innerHTML = results.map((r, i) => renderScanResult(r, i)).join('');
        } catch (e) {
            console.error('加载扫描结果失败:', e);
        }
    }

    function formatNum(n) {
        if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
        return n.toFixed(0);
    }

    function renderScanResult(r, idx) {
        const pnl = r.copier_pnl || 0;
        const pnlStr = pnl > 0 ? `+$${formatNum(pnl)}` : pnl < 0 ? `-$${formatNum(Math.abs(pnl))}` : '$0';
        const pnlColor = pnl > 0 ? 'text-green-400' : pnl < 0 ? 'text-red-400' : 'text-gray-400';

        const sr = r.sharp_ratio || 0;
        const srColor = sr >= 2 ? 'text-green-400' : sr >= 1 ? 'text-yellow-400' : 'text-gray-400';

        const wr = r.win_rate || 0;
        const wrColor = wr >= 60 ? 'text-green-400' : wr >= 45 ? 'text-yellow-400' : 'text-red-400';

        const score = r.score || 0;
        const scoreColor = score >= 60 ? 'text-green-400' : score >= 30 ? 'text-yellow-400' : 'text-gray-400';

        // 通过的筛选项
        const filters = r.passed_filters || {};
        const filterIcons = Object.entries(filters).map(([k, v]) => {
            const label = { copier_pnl: '收益', followers: '人数', sharp_ratio: '夏普', trades: '交易', win_rate: '胜率' }[k] || k;
            return `<span class="px-1.5 py-0.5 rounded text-xs ${v ? 'bg-green-500/15 text-green-400' : 'bg-red-500/10 text-red-400'}">${v ? '✓' : '✗'} ${label}</span>`;
        }).join('');

        const badge = r.badge ? `<span class="px-1.5 py-0.5 bg-yellow-500/20 text-yellow-300 text-xs rounded font-medium">${r.badge}</span>` : '';
        const tags = (r.tags || []).slice(0, 2).map(t => `<span class="px-1.5 py-0.5 bg-blue-500/15 text-blue-300 text-xs rounded">${t.label}</span>`).join('');

        const addBtn = r.already_added
            ? '<span class="text-gray-500 text-xs">已添加</span>'
            : `<button onclick="addFromScan('${r.portfolio_id}', '${(r.nickname || '').replace(/'/g, "\\'")}', this)"
                 class="px-4 py-1.5 bg-green-600 hover:bg-green-700 text-white rounded-lg text-xs font-medium transition-colors">
                 添加
               </button>`;

        const rankBadge = idx < 3 ? ['🥇', '🥈', '🥉'][idx] : `#${idx + 1}`;

        return `
        <div class="p-4 hover:bg-dark-bg/30 transition-colors">
            <div class="flex items-start justify-between gap-4">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center space-x-2 mb-2">
                        <span class="text-lg">${rankBadge}</span>
                        <span class="text-white font-bold text-sm truncate">${r.nickname || '未知'}</span>
                        ${badge} ${tags}
                    </div>
                    <div class="grid grid-cols-3 sm:grid-cols-6 gap-2 text-center mb-2">
                        <div class="bg-dark-bg/50 rounded-lg p-1.5">
                            <div class="text-gray-500 text-xs">跟单收益</div>
                            <div class="font-bold text-sm ${pnlColor}">${pnlStr}</div>
                        </div>
                        <div class="bg-dark-bg/50 rounded-lg p-1.5">
                            <div class="text-gray-500 text-xs">夏普比率</div>
                            <div class="font-bold text-sm ${srColor}">${sr.toFixed(2)}</div>
                        </div>
                        <div class="bg-dark-bg/50 rounded-lg p-1.5">
                            <div class="text-gray-500 text-xs">7天胜率</div>
                            <div class="font-bold text-sm ${wrColor}">${wr.toFixed(1)}%</div>
                        </div>
                        <div class="bg-dark-bg/50 rounded-lg p-1.5">
                            <div class="text-gray-500 text-xs">盈亏比</div>
                            <div class="font-bold text-sm text-white">${(r.avg_rr_ratio || 0).toFixed(2)}</div>
                        </div>
                        <div class="bg-dark-bg/50 rounded-lg p-1.5">
                            <div class="text-gray-500 text-xs">跟单人数</div>
                            <div class="font-bold text-sm text-white">${(r.current_copy_count || 0).toLocaleString()}</div>
                        </div>
                        <div class="bg-dark-bg/50 rounded-lg p-1.5">
                            <div class="text-gray-500 text-xs">评分</div>
                            <div class="font-bold text-sm ${scoreColor}">${score.toFixed(0)}</div>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1">${filterIcons}</div>
                </div>
                <div class="flex-shrink-0 flex items-center">${addBtn}</div>
            </div>
        </div>`;
    }

    async function addFromScan(pid, name, btn) {
        btn.disabled = true;
        btn.textContent = '添加中…';
        try {
            const res = await apiPost('/api/add_binance_trader', { url: pid });
            if (res.ok) {
                btn.textContent = '✔ 已添加';
                btn.className = 'px-4 py-1.5 bg-green-800 text-green-300 rounded-lg text-xs font-medium cursor-default';
                await loadBinanceList();
            } else {
                btn.disabled = false;
                btn.textContent = '添加';
                alert(res.error || '添加失败');
            }
        } catch (e) {
            btn.disabled = false;
            btn.textContent = '添加';
        }
    }

    async function addAllScanResults() {
        const btn = document.getElementById('btn-add-all-scan');
        if (!confirm('确定添加全部通过筛选的交易员？')) return;
        btn.disabled = true;
        btn.textContent = '添加中…';

        try {
            const data = await apiGet('/api/scan/results');
            const passed = (data.results || []).filter(r => r.all_passed && !r.already_added);

            for (const r of passed) {
                try {
                    await apiPost('/api/add_binance_trader', { url: r.portfolio_id });
                } catch (e) { }
            }

            btn.textContent = `✔ 已添加 ${passed.length} 人`;
            await loadBinanceList();
            // 刷新扫描结果中的 "已添加" 标记
            await loadScanResults();
        } catch (e) {
            btn.disabled = false;
            btn.textContent = '添加失败';
        }
    }

    // ── 页面初始化 ──────────────────────────────────────────────────────────────

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadBinanceList);
    } else {
        loadBinanceList();
    }
</script>
{% endblock %}
