<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-token" content="{{ app_ui_token }}">
    <title>{% block title %}BitgetFollow{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#0f1117', card: '#1a1d29', border: '#2a2d3a', hover: '#242736' },
                        accent: '#3b82f6',
                        profit: '#22c55e',
                        loss: '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 3px solid #2a2d3a; border-top-color: #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.6s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1d29; }
        ::-webkit-scrollbar-thumb { background: #3a3d4a; border-radius: 3px; }
    </style>
</head>
<body class="bg-dark-bg text-gray-200 min-h-screen">

    <!-- 顶部导航 -->
    <nav class="bg-dark-card border-b border-dark-border sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="flex items-center space-x-2 shrink-0">
                        <span class="text-xl font-bold text-white tracking-tight">Bitget<span class="text-blue-500">Follow</span></span>
                        <span class="text-[10px] bg-blue-600/20 text-blue-400 px-1.5 py-0.5 rounded font-bold uppercase tracking-wider">Pro</span>
                    </a>
                    
                    <div class="hidden md:flex items-center space-x-1 h-16">
                        <a href="/" class="px-4 h-full flex items-center text-sm font-medium transition-all border-b-2 {% if request.path == '/' %}border-blue-500 text-blue-500 bg-blue-500/5{% else %}border-transparent text-gray-400 hover:text-gray-200 hover:bg-white/5{% endif %}">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                            交易员发现
                        </a>
                        <a href="/my-positions" class="px-4 h-full flex items-center text-sm font-medium transition-all border-b-2 {% if request.path == '/my-positions' %}border-blue-500 text-blue-500 bg-blue-500/5{% else %}border-transparent text-gray-400 hover:text-gray-200 hover:bg-white/5{% endif %}">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            跟单管理
                        </a>

                        <a href="/live-positions" class="px-4 h-full flex items-center text-sm font-medium transition-all border-b-2 {% if request.path == '/live-positions' %}border-emerald-500 text-emerald-400 bg-emerald-500/5{% else %}border-transparent text-gray-400 hover:text-gray-200 hover:bg-white/5{% endif %}">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0-1.657 1.343-3 3-3h2a2 2 0 012 2v6a2 2 0 01-2 2h-2a3 3 0 01-3-3m0-4V7m0 4H7a2 2 0 00-2 2v3a2 2 0 002 2h5m0-7V5m0 13v1"/></svg>
                            实盘管理
                        </a>
                    </div>
                </div>

                <div class="flex items-center space-x-4">
                    <div id="status-dot" class="flex items-center space-x-2 px-3 py-1.5 rounded-full bg-dark-bg border border-dark-border text-xs font-medium transition-all">
                        <span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span>
                        <span class="text-gray-400">正在检查...</span>
                    </div>
                    
                    <a href="/settings" class="p-2 text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition-all {% if request.path == '/settings' %}text-blue-500 bg-blue-500/10{% endif %}" title="系统设置">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 fade-in">
        {% block content %}{% endblock %}
    </main>

    <!-- 通用 JS -->
    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const dot = document.getElementById('status-dot');
                if (data.collector_running) {
                    dot.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span><span class="text-green-400">采集中</span>';
                } else if (data.api_configured) {
                    dot.innerHTML = '<span class="w-2 h-2 rounded-full bg-yellow-500"></span><span class="text-yellow-400">就绪</span>';
                } else {
                    dot.innerHTML = '<span class="w-2 h-2 rounded-full bg-gray-500"></span><span class="text-gray-400">未配置</span>';
                }
            } catch(e) {}
        }

        // 心跳机制：告诉后端网页还开着，防止后端自动关闭
        const APP_TOKEN = document.querySelector('meta[name="app-token"]')?.content || "";

        async function sendHeartbeat() {
            try {
                await fetch('/api/heartbeat', { method: 'POST', headers: {'X-App-Token': APP_TOKEN} });
            } catch (e) {
                // 如果后端已经关闭，心跳会失败
                console.log('Heartbeat failed, backend might be offline.');
            }
        }

        fetchStatus();
        sendHeartbeat();
        setInterval(fetchStatus, 5000);
        setInterval(sendHeartbeat, 5000);

        async function apiPost(url, body) {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-App-Token': APP_TOKEN},
                body: JSON.stringify(body || {})
            });
            return await res.json();
        }
        
        async function apiGet(url) {
            const res = await fetch(url, {method: 'GET'});
            return await res.json();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
