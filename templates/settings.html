{% extends "base.html" %}
{% block title %}设置 - BitgetFollow{% endblock %}

{% block content %}
<div class="max-w-md mx-auto space-y-6">
    <div class="mb-6">
        <h1 class="text-xl font-bold">系统设置</h1>
        <p class="text-zinc-500 text-xs mt-1">配置 Bitget API 密钥，仅用于读取数据和辅助下单。</p>
    </div>

    {% if msg %}
    <div class="px-4 py-2 rounded text-xs {{ 'bg-green-900/50 text-green-200 border border-green-800' if msg_type == 'success' else 'bg-red-900/50 text-red-200 border border-red-800' }}">
        {{ msg }}
    </div>
    {% endif %}

    <form method="POST" class="bg-dark-card border border-dark-border rounded-xl p-6 space-y-4">
        <input type="hidden" name="_app_token" value="{{ app_ui_token }}">
        
        <div>
            <label class="block text-xs text-zinc-500 mb-1.5">Bitget API Key</label>
            <input type="text" name="api_key" value="{{ current.api_key }}" placeholder="bg_..." class="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-xs font-mono">
        </div>

        <div>
            <label class="block text-xs text-zinc-500 mb-1.5">Secret Key</label>
            <input type="password" name="secret_key" value="{{ current.secret_key }}" placeholder="Secret..." class="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-xs font-mono">
        </div>

        <div>
            <label class="block text-xs text-zinc-500 mb-1.5">Passphrase</label>
            <input type="password" name="passphrase" value="{{ current.passphrase }}" placeholder="Passphrase..." class="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-xs">
        </div>

        <div class="flex items-center gap-4">
            <div class="flex-1">
                <label class="block text-xs text-zinc-500 mb-1.5">轮询间隔 (秒)</label>
                <input type="number" name="poll_interval" value="{{ current.poll_interval }}" min="3" class="w-full bg-dark-bg border border-dark-border rounded px-3 py-2 text-xs">
            </div>
            <div class="pt-5">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded text-xs font-bold transition-colors">保存</button>
            </div>
        </div>
    </form>

    <div class="p-4 bg-zinc-900/50 border border-zinc-800 rounded-lg">
        <h4 class="text-[10px] uppercase tracking-wider text-zinc-600 font-bold mb-2">安全说明</h4>
        <ul class="text-[10px] text-zinc-500 space-y-1 list-disc list-inside">
            <li>密钥保存在本地 .env 文件中</li>
            <li>建议仅开启只读和合约交易权限</li>
            <li>定期检查 API 访问日志</li>
        </ul>
    </div>
</div>
{% endblock %}
